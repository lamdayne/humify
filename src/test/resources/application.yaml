spring:
  datasource:
    url: ${TEST_DB_URL}
    username: ${TEST_DB_USER}
    password: ${TEST_DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${TEST_GOOGLE_CLIENT_ID}
            client-secret: ${TEST_GOOGLE_CLIENT_SECRET}
            redirect-uri: ${TEST_GOOGLE_REDIRECT_URI:http://localhost:5173}/auth/google/callback
            scope:
              - openid
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

system:
  url: ${TEST_SYSTEM_URL}
  account:
    email: ${TEST_SYSTEM_EMAIL}
    password: ${TEST_SYSTEM_PASSWORD}

jwt:
  expiryAccessToken: ${TEST_EXPIRY_ACCESS_TOKEN:15} # Minutes
  expiryDay: ${TEST_EXPIRY_DAY:7}
  secretKey: ${TEST_JWT_SECRET_KEY}
  refreshKey: ${TEST_JWT_REFRESH_KEY}

sqids:
  min-length: ${TEST_SQIDS_MIN_LENGTH}
  keys:
    company: ${TEST_SQIDS_COMPANY_KEY}

resend:
  default:
    from: ${TEST_RESEND_FROM}
  api-key: ${TEST_RESEND_API_KEY}
  forgot-password:
    expiryTime: ${TEST_FORGOT_PASSWORD_TTL} # Minutes
  company-verification:
    expiryTime: ${TEST_COMPANY_VERIFY_TTL} # Minutes
  set-password:
    expiryTime: ${TEST_SET_PASSWORD_TTL} # Minutes

cloudinary:
  cloud-name: ${TEST_CLOUDINARY_CLOUD_NAME}
  api-key: ${TEST_CLOUDINARY_API_KEY}
  api-secret: ${TEST_CLOUDINARY_API_SECRET}