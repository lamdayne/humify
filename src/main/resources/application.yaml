spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5173}/auth/google/callback
            scope:
              - openid
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

system:
  url: ${SYSTEM_URL}
  account:
    email: ${SYSTEM_EMAIL}
    password: ${SYSTEM_PASSWORD}

jwt:
  expiryAccessToken: ${EXPIRY_ACCESS_TOKEN:15} # Minutes
  expiryDay: ${EXPIRY_DAY:7}
  secretKey: ${JWT_SECRET_KEY}
  refreshKey: ${JWT_REFRESH_KEY}

sqids:
  min-length: ${SQIDS_MIN_LENGTH}
  keys:
    company: ${SQIDS_COMPANY_KEY}

resend:
  default:
    from: ${RESEND_FROM}
  api-key: ${RESEND_API_KEY}
  forgot-password:
    expiryTime: ${FORGOT_PASSWORD_TTL} # Minutes
  company-verification:
    expiryTime: ${COMPANY_VERIFY_TTL} # Minutes
  set-password:
    expiryTime: ${SET_PASSWORD_TTL} # Minutes

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}