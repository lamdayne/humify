name: Continuous Integration Pipeline (Maven Build, Test, Package, Docker)
run-name: ${{ github.actor }}
on:
  push:
    branches:
      - main
      - master

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'maven'

      - name: Set Version
        id: version
        run: |
          VERSION="0.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo ">>> Building version: $VERSION"

      - name: Run Tests (Unit Test & Integration Test)
        run: mvn test
        env:
          TEST_DB_URL: ${{ secrets.TEST_DB_URL }}
          TEST_DB_USER: ${{ secrets.TEST_DB_USER }}
          TEST_DB_PASS: ${{ secrets.TEST_DB_PASS }}
          TEST_SYSTEM_EMAIL: ${{ secrets.TEST_SYSTEM_EMAIL }}
          TEST_SYSTEM_PASSWORD: ${{ secrets.TEST_SYSTEM_PASSWORD }}
          TEST_EXPIRY_ACCESS_TOKEN: ${{ secrets.TEST_EXPIRY_ACCESS_TOKEN }}
          TEST_EXPIRY_DAY: ${{ secrets.TEST_EXPIRY_DAY }}
          TEST_JWT_SECRET_KEY: ${{ secrets.TEST_JWT_SECRET_KEY }}
          TEST_JWT_REFRESH_KEY: ${{ secrets.TEST_JWT_REFRESH_KEY }}
          TEST_SQIDS_COMPANY_KEY: ${{ secrets.TEST_SQIDS_COMPANY_KEY }}
          TEST_SQIDS_MIN_LENGTH: ${{ secrets.TEST_SQIDS_MIN_LENGTH }}

      - name: SonarCloud Analysis
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate Check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build And Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/humify-backend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/humify-backend:latest
